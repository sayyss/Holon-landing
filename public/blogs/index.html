<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Holon writing and research." />
    <meta name="theme-color" content="#f5f5f0" />
    <title>Blogs - Holon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f5f0;
        --bg-elevated: #eaeae5;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --text-muted: #999999;
        --accent: #5a7a00;
        --border: #d0d0cb;
        --display: "Instrument Serif", Georgia, serif;
        --mono: "DM Mono", "SF Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--mono);
        font-size: 11.2px;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      ::selection {
        background: var(--accent);
        color: var(--bg);
      }

      .page {
        margin: 0 auto;
        max-width: 900px;
        padding: 56px 24px 96px;
      }

      .brand {
        display: inline-flex;
        margin-bottom: 72px;
        color: var(--text-secondary);
        font-size: 0.55rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.55rem;
        letter-spacing: 0.12em;
        margin: 0 0 18px;
        text-transform: uppercase;
      }

      h1,
      h2 {
        font-family: var(--display);
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1;
      }

      h1 {
        font-size: clamp(3.36rem, 8.4vw, 5.6rem);
        margin: 0 0 64px;
      }

      h2 {
        font-size: clamp(1.68rem, 4.2vw, 2.94rem);
        margin: 0 0 18px;
      }

      .post-list {
        border-top: 1px solid var(--border);
      }

      .post {
        border-bottom: 1px solid var(--border);
        display: block;
        padding: 34px 0 38px;
      }

      .post:hover h2 {
        color: var(--accent);
      }

      .meta {
        color: var(--text-muted);
        display: flex;
        flex-wrap: wrap;
        font-size: 0.55rem;
        gap: 12px;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
        text-transform: uppercase;
      }

      .summary {
        color: var(--text-secondary);
        font-size: 1.25rem;
        line-height: 1.7;
        margin: 0;
        max-width: 720px;
      }

      .arrow {
        color: var(--accent);
        display: inline-block;
        margin-left: 8px;
        transition: transform 180ms ease;
      }

      .post:hover .arrow {
        transform: translateX(4px);
      }

      @media (max-width: 680px) {
        .page {
          padding: 36px 18px 72px;
        }

        .brand {
          margin-bottom: 52px;
        }

        h1 {
          margin-bottom: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="brand" href="/">Holon</a>
      <p class="eyebrow">Writing</p>
      <h1>Blogs</h1>

      <section class="post-list" aria-label="All posts">
        <a class="post" href="/blogs/current-state-of-local-ai/">
          <div class="meta">
            <span>June 2026</span>
            <span>Research</span>
          </div>
          <h2>The current state of local AI<span class="arrow">-&gt;</span></h2>
          <p class="summary">
            An analysis of local AI adoption, tooling, hardware, use cases, and
            pain points from r/LocalLLaMA.
          </p>
        </a>
      </section>
    </main>
  </body>
</html>
